name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` runs the full quality gate: compile (Error Prone) + PMD + SpotBugs
      # + tests (JUnit + ArchUnit). VibeTags regenerates the guardrail files during compile.
      - name: Build, analyze and test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload analysis & test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports/tests/test
            build/reports/pmd
            build/reports/spotbugs
          if-no-files-found: ignore
