name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest covers the Windows-only branches (Venv Scripts/*.exe
        # resolution, SetupCommand's `py -3.x` launcher) that a Linux-only CI
        # never executes.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: runner.os == 'Linux' # harden-runner supports Linux runners only
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # `build` runs the full quality gate: compile (Error Prone) + PMD + SpotBugs
      # + tests (JUnit + ArchUnit). VibeTags regenerates the guardrail files during compile.
      - name: Build, analyze and test
        run: ./gradlew build --no-daemon --stacktrace
        shell: bash

      # Smoke-test the real CLI entry point (Skill3App -> LearnCommand wiring), which unit
      # tests never execute: an offline learn over the checked-in demo corpus, stopping
      # after discovery + ranking. No network, no Brave key, no model call.
      - name: Offline CLI smoke test
        run: ./gradlew run --no-daemon --args="learn nimbus --llm-model smoke --input-file examples/demo-corpus.txt --dry-run"
        shell: bash

      - name: Upload analysis & test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports-${{ matrix.os }}
          path: |
            build/reports/tests/test
            build/reports/pmd
            build/reports/spotbugs
          if-no-files-found: ignore
